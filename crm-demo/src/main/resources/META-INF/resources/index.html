<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM客户管理系统</title>
    <link rel="stylesheet" href="/webjars/bootstrap/5.3.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-dark: #4338CA;
            --secondary: #6366F1;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --dark: #1F2937;
            --gray: #6B7280;
            --light: #F3F4F6;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        
        .container {
            max-width: 1400px;
            padding: 2rem 1rem;
        }
        
        .header-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }
        
        .main-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }
        
        .stat-card {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 15px;
            padding: 1.5rem;
            color: white;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(79, 70, 229, 0.3);
        }
        
        .stat-card.success {
            background: linear-gradient(135deg, var(--success) 0%, #34D399 100%);
        }
        
        .stat-card.warning {
            background: linear-gradient(135deg, var(--warning) 0%, #FBBF24 100%);
        }
        
        .stat-card i {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        .stat-card .number {
            font-size: 2.5rem;
            font-weight: 700;
        }
        
        .stat-card .label {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .search-box {
            position: relative;
        }
        
        .search-box input {
            padding-left: 45px;
            border-radius: 10px;
            border: 2px solid #E5E7EB;
            transition: all 0.3s ease;
        }
        
        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        
        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border: none;
            border-radius: 10px;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
        }
        
        .btn-action {
            border-radius: 8px;
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }
        
        .btn-action:hover {
            transform: scale(1.05);
        }
        
        .customer-table {
            margin-top: 1.5rem;
        }
        
        .customer-table thead {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
        }
        
        .customer-table thead th {
            border: none;
            padding: 1rem;
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .customer-table tbody tr {
            transition: all 0.2s ease;
        }
        
        .customer-table tbody tr:hover {
            background: rgba(79, 70, 229, 0.05);
            transform: scale(1.01);
        }
        
        .customer-table tbody td {
            padding: 1rem;
            vertical-align: middle;
            border-color: #E5E7EB;
        }
        
        .status-badge {
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .status-active {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }
        
        .status-inactive {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }
        
        .modal-content {
            border-radius: 15px;
            border: none;
        }
        
        .modal-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border-radius: 15px 15px 0 0;
        }
        
        .modal-header .btn-close {
            filter: invert(1);
        }
        
        .form-control, .form-select {
            border-radius: 10px;
            border: 2px solid #E5E7EB;
            padding: 0.75rem 1rem;
            transition: all 0.3s ease;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--gray);
        }
        
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }
        
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }
        
        .toast {
            border-radius: 10px;
            border: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .main-card {
            animation: slideIn 0.5s ease;
        }
        
        .title-gradient {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-card">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <h1 class="mb-2 title-gradient">
                        <i class="fas fa-users me-2"></i>CRM客户管理系统
                    </h1>
                    <p class="text-muted mb-0">简单、高效的客户关系管理</p>
                </div>
                <div class="col-md-6">
                    <div class="row g-3">
                        <div class="col-4">
                            <div class="stat-card">
                                <i class="fas fa-users"></i>
                                <div class="number" id="totalCount">0</div>
                                <div class="label">总客户数</div>
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="stat-card success">
                                <i class="fas fa-user-check"></i>
                                <div class="number" id="activeCount">0</div>
                                <div class="label">活跃客户</div>
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="stat-card warning">
                                <i class="fas fa-user-clock"></i>
                                <div class="number" id="inactiveCount">0</div>
                                <div class="label">非活跃</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="main-card">
            <div class="row mb-4 align-items-center">
                <div class="col-md-6">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" class="form-control" id="searchInput" placeholder="搜索客户姓名...">
                    </div>
                </div>
                <div class="col-md-6 text-end">
                    <button class="btn btn-primary" onclick="openAddModal()">
                        <i class="fas fa-plus me-2"></i>添加客户
                    </button>
                </div>
            </div>
            
            <div class="table-responsive customer-table">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th><i class="fas fa-user me-2"></i>姓名</th>
                            <th><i class="fas fa-envelope me-2"></i>邮箱</th>
                            <th><i class="fas fa-phone me-2"></i>电话</th>
                            <th><i class="fas fa-building me-2"></i>公司</th>
                            <th><i class="fas fa-toggle-on me-2"></i>状态</th>
                            <th><i class="fas fa-cog me-2"></i>操作</th>
                        </tr>
                    </thead>
                    <tbody id="customerTableBody">
                    </tbody>
                </table>
            </div>
            
            <div class="empty-state" id="emptyState" style="display: none;">
                <i class="fas fa-user-slash"></i>
                <h4>暂无客户数据</h4>
                <p>点击上方"添加客户"按钮创建第一个客户</p>
            </div>
        </div>
    </div>
    
    <div class="modal fade" id="customerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">
                        <i class="fas fa-user-plus me-2"></i>添加客户
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="customerForm">
                        <input type="hidden" id="customerId">
                        <div class="mb-3">
                            <label class="form-label">姓名 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">邮箱</label>
                            <input type="email" class="form-control" id="email">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">电话</label>
                            <input type="text" class="form-control" id="phone">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">公司</label>
                            <input type="text" class="form-control" id="company">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">状态</label>
                            <select class="form-select" id="status">
                                <option value="ACTIVE">活跃</option>
                                <option value="INACTIVE">非活跃</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveCustomer()">
                        <i class="fas fa-save me-2"></i>保存
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="toast-container" id="toastContainer"></div>
    
    <script src="/webjars/jquery/3.7.1/jquery.min.js"></script>
    <script src="/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    <script>
        let modal;
        
        $(document).ready(function() {
            modal = new bootstrap.Modal(document.getElementById('customerModal'));
            loadCustomers();
            updateStats();
            
            $('#searchInput').on('input', function() {
                loadCustomers($(this).val());
            });
        });
        
        function loadCustomers(keyword = '') {
            const url = keyword ? `/api/customers/search?keyword=${encodeURIComponent(keyword)}` : '/api/customers';
            
            $.get(url, function(customers) {
                renderTable(customers);
            }).fail(function() {
                showToast('加载客户数据失败', 'danger');
            });
        }
        
        function renderTable(customers) {
            const tbody = $('#customerTableBody');
            tbody.empty();
            
            if (customers.length === 0) {
                $('#emptyState').show();
                $('.table-responsive').hide();
                return;
            }
            
            $('#emptyState').hide();
            $('.table-responsive').show();
            
            customers.forEach(customer => {
                const statusClass = customer.status === 'ACTIVE' ? 'status-active' : 'status-inactive';
                const statusText = customer.status === 'ACTIVE' ? '活跃' : '非活跃';
                
                tbody.append(`
                    <tr>
                        <td><strong>${escapeHtml(customer.name)}</strong></td>
                        <td>${escapeHtml(customer.email || '-')}</td>
                        <td>${escapeHtml(customer.phone || '-')}</td>
                        <td>${escapeHtml(customer.company || '-')}</td>
                        <td>
                            <span class="status-badge ${statusClass}">
                                <i class="fas fa-${customer.status === 'ACTIVE' ? 'check-circle' : 'times-circle'} me-1"></i>
                                ${statusText}
                            </span>
                        </td>
                        <td>
                            <button class="btn btn-outline-primary btn-action me-2" onclick="editCustomer(${customer.id})">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn btn-outline-warning btn-action me-2" onclick="toggleStatus(${customer.id})">
                                <i class="fas fa-toggle-on"></i>
                            </button>
                            <button class="btn btn-outline-danger btn-action" onclick="deleteCustomer(${customer.id}, '${escapeHtml(customer.name)}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `);
            });
        }
        
        function updateStats() {
            $.get('/api/customers/stats', function(stats) {
                $('#totalCount').text(stats.total);
                $('#activeCount').text(stats.active);
                $('#inactiveCount').text(stats.inactive);
            });
        }
        
        function openAddModal() {
            $('#modalTitle').html('<i class="fas fa-user-plus me-2"></i>添加客户');
            $('#customerForm')[0].reset();
            $('#customerId').val('');
            modal.show();
        }
        
        function editCustomer(id) {
            $.get(`/api/customers/${id}`, function(customer) {
                $('#modalTitle').html('<i class="fas fa-edit me-2"></i>编辑客户');
                $('#customerId').val(customer.id);
                $('#name').val(customer.name);
                $('#email').val(customer.email);
                $('#phone').val(customer.phone);
                $('#company').val(customer.company);
                $('#status').val(customer.status);
                modal.show();
            }).fail(function() {
                showToast('获取客户信息失败', 'danger');
            });
        }
        
        function saveCustomer() {
            const id = $('#customerId').val();
            const customer = {
                name: $('#name').val(),
                email: $('#email').val(),
                phone: $('#phone').val(),
                company: $('#company').val(),
                status: $('#status').val()
            };
            
            if (!customer.name.trim()) {
                showToast('请输入客户姓名', 'warning');
                return;
            }
            
            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/customers/${id}` : '/api/customers';
            
            $.ajax({
                url: url,
                type: method,
                contentType: 'application/json',
                data: JSON.stringify(customer),
                success: function() {
                    modal.hide();
                    loadCustomers();
                    updateStats();
                    showToast(id ? '客户信息已更新' : '客户添加成功', 'success');
                },
                error: function() {
                    showToast('保存失败', 'danger');
                }
            });
        }
        
        function toggleStatus(id) {
            $.ajax({
                url: `/api/customers/${id}/toggle-status`,
                type: 'PATCH',
                success: function() {
                    loadCustomers();
                    updateStats();
                    showToast('状态已切换', 'success');
                },
                error: function() {
                    showToast('操作失败', 'danger');
                }
            });
        }
        
        function deleteCustomer(id, name) {
            if (confirm(`确定要删除客户"${name}"吗？此操作不可撤销。`)) {
                $.ajax({
                    url: `/api/customers/${id}`,
                    type: 'DELETE',
                    success: function() {
                        loadCustomers();
                        updateStats();
                        showToast('客户已删除', 'success');
                    },
                    error: function(jqXHR) {
                        let errorMsg = '删除失败';
                        if (jqXHR.status === 404) {
                            errorMsg = '客户不存在';
                        }
                        showToast(errorMsg, 'danger');
                    }
                });
            }
        }
        
        function showToast(message, type = 'info') {
            const toast = $(`
                <div class="toast show align-items-center text-white bg-${type} border-0" role="alert">
                    <div class="d-flex">
                        <div class="toast-body">
                            <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'danger' ? 'exclamation-circle' : 'info-circle'} me-2"></i>
                            ${message}
                        </div>
                    </div>
                </div>
            `);
            
            $('#toastContainer').append(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
